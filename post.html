<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post — Oslan Villalobos</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <style>
    :root {
      --bg: #0b0e14; --bg2: #111520; --surface: #161b27;
      --border: #1e2535; --accent: #00d4ff; --accent2: #7c6cfa;
      --accent3: #00ff9d; --text: #e2e8f0; --muted: #64748b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.5;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none; z-index: 0;
    }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 3rem; background: rgba(11,14,20,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--accent); letter-spacing: 0.08em; text-decoration: none; }
    .nav-logo span { color: var(--muted); }
    .back-link { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted); text-decoration: none; letter-spacing: 0.05em; transition: color 0.2s; display: flex; align-items: center; gap: 0.4rem; }
    .back-link:hover { color: var(--accent); }

    /* POST WRAPPER */
    .post-wrapper { position: relative; z-index: 1; max-width: 740px; margin: 0 auto; padding: 8rem 2rem 6rem; }

    /* POST HEADER */
    .post-header { margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
    .post-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .post-date { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.06em; }
    .post-category { font-family: 'DM Mono', monospace; font-size: 0.65rem; padding: 0.2rem 0.6rem; border-radius: 2px; letter-spacing: 0.06em; }
    .cat-aws    { background: rgba(255,153,0,0.12);  color: #ff9900;        border: 1px solid rgba(255,153,0,0.25); }
    .cat-k8s    { background: rgba(50,109,230,0.12); color: #326ce5;        border: 1px solid rgba(50,109,230,0.25); }
    .cat-iac    { background: rgba(124,108,250,0.12);color: var(--accent2); border: 1px solid rgba(124,108,250,0.25); }
    .cat-sre    { background: rgba(0,255,157,0.08);  color: var(--accent3); border: 1px solid rgba(0,255,157,0.2); }
    .cat-linux  { background: rgba(0,212,255,0.08);  color: var(--accent);  border: 1px solid rgba(0,212,255,0.2); }
    .post-title-head { font-family: 'Space Grotesk', sans-serif; font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 1rem; }
    .post-excerpt-head { font-size: 1rem; color: var(--muted); line-height: 1.75; }

    /* POST BODY — Markdown rendered content */
    .post-body { font-size: 0.97rem; line-height: 1.85; color: #c9d1d9; }
    .post-body h1, .post-body h2, .post-body h3, .post-body h4 {
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text);
      letter-spacing: -0.02em;
      margin: 2.5rem 0 1rem;
      font-weight: 600;
    }
    .post-body h1 { font-size: 2rem; }
    .post-body h2 { font-size: 1.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .post-body h3 { font-size: 1.2rem; }
    .post-body p { margin-bottom: 1.25rem; }
    .post-body a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
    .post-body a:hover { color: #33ddff; }
    .post-body strong { color: var(--text); font-weight: 500; }
    .post-body em { color: var(--muted); }
    .post-body ul, .post-body ol { padding-left: 1.5rem; margin-bottom: 1.25rem; }
    .post-body li { margin-bottom: 0.4rem; }
    .post-body blockquote {
      border-left: 3px solid var(--accent2);
      padding: 0.75rem 1.25rem;
      margin: 1.5rem 0;
      background: var(--surface);
      color: var(--muted);
      border-radius: 0 4px 4px 0;
    }
    .post-body code {
      font-family: 'DM Mono', monospace;
      font-size: 0.85em;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.15em 0.4em;
      border-radius: 3px;
      color: var(--accent3);
    }
    .post-body pre {
      background: #0d1117 !important;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow-x: auto;
      margin: 1.5rem 0;
    }
    .post-body pre code {
      background: transparent;
      border: none;
      padding: 0;
      color: inherit;
      font-size: 0.82rem;
      line-height: 1.6;
    }
    .post-body table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; font-size: 0.88rem; }
    .post-body th { font-family: 'DM Mono', monospace; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); border-bottom: 1px solid var(--border); padding: 0.75rem; text-align: left; }
    .post-body td { padding: 0.65rem 0.75rem; border-bottom: 1px solid var(--border); color: var(--muted); }
    .post-body tr:hover td { color: var(--text); }
    .post-body hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    .post-body img { max-width: 100%; border-radius: 6px; border: 1px solid var(--border); margin: 1.5rem 0; }

    /* LOADING */
    .post-loading { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--muted); padding: 4rem 0; text-align: center; }
    .post-loading::before { content: '$ '; color: var(--accent3); }
    .post-error { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: #ff5f57; padding: 4rem 0; text-align: center; }

    /* FOOTER */
    .post-footer-nav { display: flex; justify-content: space-between; align-items: center; padding: 2rem 0; margin-top: 4rem; border-top: 1px solid var(--border); }
    .post-footer-link { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; transition: color 0.2s; }
    .post-footer-link:hover { color: var(--accent); }
    footer { position: relative; z-index: 1; border-top: 1px solid var(--border); padding: 2rem 3rem; max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .footer-left { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); }
    .footer-left span { color: var(--accent); }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: var(--accent); }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .post-wrapper { padding: 6rem 1.5rem 4rem; }
      footer { flex-direction: column; gap: 1rem; text-align: center; padding: 2rem 1.5rem; }
      .footer-links { flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">oslan<span>.dev</span></a>
    <a href="blog.html" class="back-link">← Back to blog</a>
  </nav>

  <div class="post-wrapper">
    <div id="postContent">
      <div class="post-loading">loading post...</div>
    </div>

    <div class="post-footer-nav">
      <a href="blog.html" class="post-footer-link">← All posts</a>
      <a href="index.html#contact" class="post-footer-link">Get in touch →</a>
    </div>
  </div>

  <footer>
    <div class="footer-left">© <span id="year"></span> <span>Oslan Villalobos</span></div>
    <div class="footer-links">
      <a href="blog.html">Blog</a>
      <a href="https://github.com/Oslan17" target="_blank" rel="noopener">GitHub</a>
      <a href="index.html#contact">Contact</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const catClass = { aws: 'cat-aws', k8s: 'cat-k8s', iac: 'cat-iac', sre: 'cat-sre', linux: 'cat-linux' };
    const catLabel = { aws: 'AWS', k8s: 'Kubernetes', iac: 'IaC', sre: 'SRE', linux: 'Linux' };

    const params = new URLSearchParams(window.location.search);
    const slug   = params.get('post');

    if (!slug) {
      document.getElementById('postContent').innerHTML = '<p class="post-error">No post specified. <a href="blog.html">Back to blog.</a></p>';
    } else {
      // Configure marked with highlight.js
      marked.setOptions({
        highlight: (code, lang) => {
          if (lang && hljs.getLanguage(lang)) {
            return hljs.highlight(code, { language: lang }).value;
          }
          return hljs.highlightAuto(code).value;
        },
        breaks: true,
        gfm: true
      });

      // Load post metadata then the markdown file
      fetch('posts/index.json')
        .then(r => r.json())
        .then(posts => {
          const meta = posts.find(p => p.slug === slug);
          return fetch(`posts/${slug}.md`)
            .then(r => {
              if (!r.ok) throw new Error('Post not found');
              return r.text();
            })
            .then(md => ({ meta, md }));
        })
        .then(({ meta, md }) => {
          // Strip the first H1 from markdown (shown in header instead)
          const body = md.replace(/^#\s+.+\n/, '');

          const header = meta ? `
            <div class="post-header">
              <div class="post-meta">
                <span class="post-date">${meta.date}</span>
                <span class="post-category ${catClass[meta.cat] || ''}">${catLabel[meta.cat] || meta.cat}</span>
              </div>
              <h1 class="post-title-head">${meta.title}</h1>
              <p class="post-excerpt-head">${meta.excerpt}</p>
            </div>` : '';

          document.getElementById('postContent').innerHTML =
            header + `<div class="post-body">${marked.parse(body)}</div>`;

          // Update page title
          if (meta) document.title = `${meta.title} — Oslan Villalobos`;

          // Highlight any remaining code blocks
          document.querySelectorAll('.post-body pre code').forEach(el => hljs.highlightElement(el));
        })
        .catch(err => {
          document.getElementById('postContent').innerHTML =
            `<p class="post-error">Could not load post. <a href="blog.html">Back to blog.</a></p>`;
        });
    }
  </script>
</body>
</html>
